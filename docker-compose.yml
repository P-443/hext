version: '3.8'

services:
  codez:
    build: .
    container_name: codez
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-d8582c21bb784dd590a24ec8c416d221}
      - CODE=${CODE:-12345}
      - HIDE_USER_API_KEY=${HIDE_USER_API_KEY:-1}
      - PROXY_URL=${PROXY_URL:-}
      - BASE_URL=${BASE_URL:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-chat}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s